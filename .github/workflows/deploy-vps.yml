# Деплой на VPS после push в main. Секреты: GitHub → Settings → Secrets → Actions:
#   VPS_HOST, VPS_USER, VPS_SSH_KEY (приватный ключ OpenSSH целиком)
# Опционально: VPS_PATH (если не задан — /var/www/business-card-site)
#
# На сервере один раз: git clone <этот-репозиторий> /var/www/business-card-site

name: Deploy VPS

# Автодепой при push в main (нужны секреты VPS_*). Вручную: Actions → Deploy VPS → Run workflow.
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pull and build on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            VPS_PATH="${{ secrets.VPS_PATH }}"
            if [ -z "$VPS_PATH" ]; then VPS_PATH="/var/www/business-card-site"; fi
            cd "$VPS_PATH"
            git fetch origin main
            git reset --hard origin/main
            chmod +x deploy/server-build.sh
            bash deploy/server-build.sh
