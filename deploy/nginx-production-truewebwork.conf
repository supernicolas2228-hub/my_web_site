# Пример для VPS: truewebwork.ru сразу уходит на https://www (один редирект с HTTP apex).
# Скопируйте в /etc/nginx/sites-available/truweb.conf, поправьте пути к сертификату после certbot:
#   sudo certbot certonly --webroot -w /var/www/html -d truewebwork.ru -d www.truewebwork.ru
# или: sudo certbot --nginx -d truewebwork.ru -d www.truewebwork.ru
#
# Затем: sudo nginx -t && sudo systemctl reload nginx
#
# ВАЖНО:
# - основной ECDSA-сертификат быстрее для современных клиентов;
# - параллельный RSA-сертификат повышает совместимость с частью VPN/прокси/TLS-посредников.

# --- Порт 80: всё сразу на канонический https://www ---
server {
    listen 80;
    listen [::]:80;
    server_name truewebwork.ru www.truewebwork.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    return 301 https://www.truewebwork.ru$request_uri;
}

# --- Порт 443: apex → www, www → Node ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name truewebwork.ru www.truewebwork.ru;

    server_tokens off;
    access_log /var/log/nginx/truewebwork.access.log combined;
    error_log  /var/log/nginx/truewebwork.error.log warn;

    ssl_certificate     /etc/letsencrypt/live/truewebwork.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/truewebwork.ru/privkey.pem;
    ssl_certificate     /etc/letsencrypt/live/truewebwork-rsa/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/truewebwork-rsa/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    if ($host = truewebwork.ru) {
        return 308 https://www.truewebwork.ru$request_uri;
    }

    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # sub_filter: без пересборки Next подменяет старый бот на @TrueWebWork_bot в HTML/JSON.
    # Нужен ngx_http_sub_module. proxy_buffering on + пустой Accept-Encoding — иначе gzip ломает замену.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_connect_timeout 75s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering on;
        proxy_request_buffering off;
        proxy_set_header Accept-Encoding "";
        sub_filter_types text/html application/json;
        sub_filter 'https://t.me/Site_and_Bot_Lab_bot' 'https://t.me/TrueWebWork_bot';
        sub_filter '@Site_and_Bot_Lab_bot' '@TrueWebWork_bot';
        sub_filter_once off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
