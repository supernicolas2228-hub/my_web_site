# Пример для VPS: truewebwork.ru сразу уходит на https://www (один редирект с HTTP apex).
# Скопируйте в /etc/nginx/sites-available/truweb.conf, поправьте пути к сертификату после certbot:
#   sudo certbot certonly --webroot -w /var/www/html -d truewebwork.ru -d www.truewebwork.ru
# или: sudo certbot --nginx -d truewebwork.ru -d www.truewebwork.ru
#
# Затем: sudo nginx -t && sudo systemctl reload nginx
#
# ВАЖНО: ssl_certificate должны быть ОДНИ И ТЕ ЖЕ для обоих имён (один SAN-сертификат).

# --- Порт 80: всё сразу на канонический https://www ---
server {
    listen 80;
    listen [::]:80;
    server_name truewebwork.ru www.truewebwork.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    return 301 https://www.truewebwork.ru$request_uri;
}

# --- Порт 443: apex → www, www → Node ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name truewebwork.ru www.truewebwork.ru;

    ssl_certificate     /etc/letsencrypt/live/truewebwork.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/truewebwork.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    # Если файла нет: sudo openssl dhparam -out /etc/letsencrypt/ssl-dhparams.pem 2048
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    if ($host = truewebwork.ru) {
        return 301 https://www.truewebwork.ru$request_uri;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_connect_timeout 75s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
