# Скопируй в /etc/nginx/sites-available/ (например truweb.conf)
# sudo ln -s /etc/nginx/sites-available/truweb.conf /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
#
# Замени server_name на свой IP или домен.
# SSL: certbot --nginx -d твой-домен.ru
#
# Если перед сервером Cloudflare: в http {} добавь map и подставь $forwarded_proto:
#   map $http_x_forwarded_proto $forwarded_proto { default $http_x_forwarded_proto; '' $scheme; }
#   proxy_set_header X-Forwarded-Proto $forwarded_proto;

server {
    listen 80;
    listen [::]:80;
    server_name 138.124.90.218 _;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        # Медленные сети (VPN, мобильный интернет): не обрывать долгую отдачу Next/RSC
        proxy_connect_timeout 75s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
