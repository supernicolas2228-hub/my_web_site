# Скопируй в /etc/nginx/sites-available/ (например truweb.conf)
# sudo ln -s /etc/nginx/sites-available/truweb.conf /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
#
# Замени server_name на свой IP или домен.
# SSL: certbot --nginx -d твой-домен.ru

server {
    listen 80;
    listen [::]:80;
    server_name 138.124.90.218 _;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
