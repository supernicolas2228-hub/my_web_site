# Скопируй в /etc/nginx/sites-available/ (например truweb.conf)
# sudo ln -s /etc/nginx/sites-available/truweb.conf /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
#
# Замени server_name на свой IP или домен. Канонический хост в приложении — www.
#
# «Без www не открывается»: сертификат должен покрывать ОБА имени
# (certbot: -d truewebwork.ru -d www.truewebwork.ru), иначе HTTPS на apex падает до редиректа.
#
# Порт 80 — один прыжок на https://www (меньше таймаутов на мобильном):
#   server_name truewebwork.ru www.truewebwork.ru;
#   if ($host = truewebwork.ru) { return 301 https://www.truewebwork.ru$request_uri; }
#   return 301 https://www.truewebwork.ru$request_uri;
#
# Порт 443 — тот же server_name; для apex перед proxy_pass:
#   if ($host = truewebwork.ru) { return 301 https://www.truewebwork.ru$request_uri; }
#
# Если перед сервером Cloudflare: в http {} добавь map и подставь $forwarded_proto:
#   map $http_x_forwarded_proto $forwarded_proto { default $http_x_forwarded_proto; '' $scheme; }
#   proxy_set_header X-Forwarded-Proto $forwarded_proto;

server {
    listen 80;
    listen [::]:80;
    server_name 138.124.90.218 _;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        # Медленные сети (VPN, мобильный интернет): не обрывать долгую отдачу Next/RSC
        proxy_connect_timeout 75s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        # Next.js App Router стримит HTML/RSC чанками. Буферизация в nginx иногда даёт
        # «вечную загрузку» или пустую страницу в Safari / WebView (в т.ч. из Telegram).
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
